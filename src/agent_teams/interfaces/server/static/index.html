<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Teams</title>
    <link rel="icon" href="data:,">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Highlight.js for Code Blocks -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>Agent Teams</h2>
                <div class="new-session-glow">
                    <button id="new-btn" class="primary-btn">
                        <svg viewBox="0 0 24 24" fill="none" class="icon">
                            <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        New Session
                    </button>
                </div>
            </header>

            <button id="back-btn" class="back-btn" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" class="icon">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Back
            </button>

            <div class="rounds-list" id="rounds-list" style="display: none;"></div>
            <div class="sessions-list" id="sessions-list"></div>

            <div class="sidebar-footer">
                <div class="status-indicator online"><span></span> Backend Connected</div>
            </div>
        </aside>
        <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize sidebar"></div>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Topbar -->
            <header class="topbar"
                style="justify-content: space-between; padding: 0 1rem; border-bottom: 1px solid var(--border-color); height: 50px;">
                <button id="toggle-sidebar" class="icon-btn" title="Toggle Sidebar">
                    <svg viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </button>
                <div style="flex:1"></div>
                <button id="toggle-theme" class="icon-btn" title="Toggle Theme" style="margin-right:0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" class="icon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </header>

            <!-- Chat Area -->
            <div class="chat-container">
                <!-- Coordinator chat messages -->
                <div class="chat-scroll" id="chat-messages">
                    <div class="system-intro">
                        <div class="intro-icon">🛸</div>
                        <h1>Welcome to Agent Teams</h1>
                        <p>Initialize a session or select from history to begin.</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <form id="chat-form">
                        <div class="input-wrapper">
                            <textarea id="prompt-input" placeholder="What would you like the agents to do?" rows="1"
                                required></textarea>
                            <button type="submit" id="send-btn" title="Send (Enter)">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2Z" stroke="currentColor"
                                        stroke-width="2" stroke-linejoin="round" />
                                </svg>
                            </button>
                        </div>
                    </form>
                    <div class="input-controls">
                        <div class="mode-selector-group">
                            <label for="execution-mode-select" class="mode-label">模式</label>
                            <select id="execution-mode-select" class="mode-select">
                                <option value="ai">&#x1F916; AI 编排</option>
                                <option value="auto">&#x26A1; 全自动</option>
                                <option value="human">&#x1F9D1; 人工</option>
                            </select>
                        </div>
                        <label class="gate-label">
                            <input type="checkbox" id="confirmation-gate-check">
                            <span>确认门</span>
                        </label>
                    </div>
                    <div class="sub-text">Enter to send · Shift+Enter for new line</div>
                </div>
            </div>
        </main>
        <div class="right-rail-resizer" id="right-rail-resizer" title="Drag to resize right rail"></div>

        <aside class="right-rail" id="right-rail">
            <section class="rail-graph-card">
                <div id="workflow-collapsed" class="workflow-collapsed" style="display:none;"></div>
                <div id="workflow-panel" class="workflow-panel" style="display: flex;">
                    <div class="workflow-header">
                        <h4>Execution Graph — <span class="wf-hint">跟随当前 Round</span></h4>
                        <span id="workflow-count" class="workflow-count">0</span>
                    </div>
                    <div class="workflow-canvas" id="workflow-canvas"></div>
                </div>
            </section>

            <section class="rail-subagent-card">
                <div class="agent-placeholder">Click a node to view subagent details</div>
                <aside class="agent-drawer" id="agent-drawer"></aside>
            </section>

            <section class="rail-inspector-card" id="rail-inspector">
                <div id="inspector-panel" class="inspector-panel">
                    <div class="inspector-header">
                        <h4>System Logs</h4>
                        <button id="toggle-inspector" class="icon-btn" title="Toggle Logs">
                            <svg viewBox="0 0 24 24" fill="none" class="icon">
                                <path d="M19 9l-7 7-7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </button>
                    </div>
                    <div class="inspector-canvas" id="system-logs"></div>
                </div>
            </section>
        </aside>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script type="module" src="/static/js/app.js"></script>
</body>

</html>

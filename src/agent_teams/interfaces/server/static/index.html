<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Teams</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Highlight.js for Code Blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>Agent Teams</h2>
                <div class="new-session-glow">
                    <button id="new-btn" class="primary-btn">
                        <svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        New Session
                    </button>
                </div>
            </header>
            
            <div class="sessions-list" id="sessions-list">
                <!-- Session items will be dynamically injected here -->
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator online"><span></span> Backend Connected</div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Topbar Info -->
            <header class="topbar">
                <div class="session-info">
                    <span id="current-session-label">Select a session</span>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-container">
                <div class="chat-scroll" id="chat-messages">
                    <!-- Intro -->
                    <div class="system-intro">
                        <div class="intro-icon">🛸</div>
                        <h1>Welcome to Agent Teams</h1>
                        <p>Initialize a session or select from history to begin.</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <form id="chat-form">
                        <div class="input-wrapper">
                            <textarea id="prompt-input" placeholder="What would you like the agents to do?" rows="1" required></textarea>
                            <button type="submit" id="send-btn" title="Send (Enter)">
                                <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
                            </button>
                        </div>
                    </form>
                    <div class="sub-text">Ctrl+Enter for line break. All logic runs in backend.</div>
                </div>
            </div>
        </main>
        
        <!-- Logs/Inspector Panel (optional right-side details) -->
        <aside class="inspector" id="inspector-panel">
            <header>
                <h3>System Logs</h3>
                <button id="toggle-inspector" class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" class="icon"><path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
            </header>
            <div class="logs-scroll" id="system-logs"></div>
        </aside>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
